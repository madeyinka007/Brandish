name: Frontend CI

# Test gate for the web/ Next.js app (public blog + admin dashboard at /admin). Amplify
# performs the actual build+deploy on its own when it detects a push (its preBuild runs
# `npm test` too — see web/amplify.yml); this workflow runs the same check on pull requests
# so they're gated before merge.
on:
  push:
    branches: [main]
    paths: ["web/**"]
  pull_request:
    paths: ["web/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
